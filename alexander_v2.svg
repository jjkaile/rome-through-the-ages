<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <style>
    .pencil {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .light {
      fill: none;
      stroke: #8a8a8a;
      stroke-width: 0.8;
      stroke-linecap: round;
    }
    .heavy {
      fill: none;
      stroke: #3a3a3a;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .motion {
      fill: none;
      stroke: #aaaaaa;
      stroke-width: 0.5;
      stroke-linecap: round;
    }
    .impact {
      fill: none;
      stroke: #5a5a5a;
      stroke-width: 1.0;
      stroke-linecap: round;
    }
  </style>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT: DARIUS III — proud but scared    -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Persian tiara — tall, ornate -->
  <path class="pencil" d="
    M 138,95
    C 134,82 138,68 148,60
    C 158,55 172,53 182,58
    C 192,64 196,76 194,88
    L 194,105
    L 138,105
    Z
  " />
  <!-- Crown ornament spikes -->
  <path class="light" d="M 155,58 L 158,42 L 163,56" />
  <path class="light" d="M 168,54 L 172,38 L 176,54" />
  <path class="light" d="M 180,57 L 184,44 L 187,58" />
  <!-- Crown jewel band -->
  <path class="light" d="M 140,92 L 192,92" />
  <circle class="light" cx="155" cy="92" r="3" />
  <circle class="light" cx="172" cy="92" r="3" />

  <!-- Head -->
