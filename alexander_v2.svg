  <path class="pencil" d="M 140,122 C 146,117 154,119 162,124" />
  <path class="pencil" d="M 170,120 C 178,115 186,117 194,122" />
  <!-- Sweat drop -->
  <path class="light" d="M 200,118 C 202,122 201,128 198,130" />

  <!-- Nose — regal, aquiline -->
  <path class="pencil" d="M 166,134 C 168,142 170,150 172,158 C 174,162 170,164 166,162" />

  <!-- Mouth — tight, trying to maintain composure -->
  <path class="pencil" d="M 156,172 C 162,175 170,176 176,174" />
  <!-- Slight downturn -->
  <path class="light" d="M 154,174 C 153,176 154,178 156,178" />

