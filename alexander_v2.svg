  <path class="pencil" d="M 334,248 L 344,248" />
  <path class="pencil" d="M 332,252 L 340,256" />


  <!-- ═══════════════════════════════════════ -->
  <!-- CENTER: THE SHIELD + SPEAR THROUGH IT  -->
  <!-- ═══════════════════════════════════════ -->

  <!-- THE SHIELD — large, round, Macedonian -->
  <ellipse class="heavy" cx="450" cy="280" rx="75" ry="72" />
