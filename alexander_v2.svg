  <line class="pencil" x1="459" y1="271" x2="466" y2="264" />

  <!-- JAVELIN — stuck through the shield from the left, stopped -->
  <!-- Entry side (from Darius) -->
  <path class="heavy" d="M 340,260 L 410,272" />
