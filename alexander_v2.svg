  <ellipse class="pencil" cx="152" cy="132" rx="9" ry="6" />
  <!-- Right eye — wide -->
  <ellipse class="pencil" cx="180" cy="130" rx="9" ry="6" />
  <!-- Pupils — darting right, tiny with fear -->
