  <path class="impact" d="M 410,272 L 400,262" />
  <path class="impact" d="M 410,272 L 398,270" />
  <path class="impact" d="M 410,272 L 405,258" />
  <path class="impact" d="M 410,272 L 415,260" />

  <!-- THE SARISSA (SPEAR) — the money line -->
  <!-- Goes FROM Alexander on right, THROUGH the shield, into Darius -->
  <!-- The spear passes OVER/past the shield toward Darius's chest -->
  <path class="heavy" d="
    M 710,310
    L 580,300
    L 450,320
    L 320,348
    L 200,370
  " />
  <!-- Spear point — buried in Darius's chest area -->
  <path class="pencil" d="M 200,370 L 188,365 L 192,376 Z" />

  <!-- Impact point on Darius — the spear reaches him -->
  <path class="impact" d="M 200,370 L 192,362" />
  <path class="impact" d="M 200,370 L 190,374" />
  <path class="impact" d="M 200,370 L 195,358" />

  <!-- Motion lines along the spear thrust -->
