  <circle class="pencil" cx="450" cy="280" r="12" />
  <!-- 8 rays -->
  <line class="pencil" x1="450" y1="258" x2="450" y2="268" />
  <line class="pencil" x1="450" y1="292" x2="450" y2="302" />
  <line class="pencil" x1="428" y1="280" x2="438" y2="280" />
  <line class="pencil" x1="462" y1="280" x2="472" y2="280" />
  <line class="pencil" x1="434" y1="264" x2="441" y2="271" />
  <line class="pencil" x1="459" y1="289" x2="466" y2="296" />
