<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rome Through the Ages — The 1260-Year Mirror</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --gold: #c9a94e;
    --gold-light: #e8d48b;
    --gold-dark: #8a6d1b;
    --parchment: #f5f0e1;
    --parchment-dark: #e8dcc8;
    --ink: #2c1810;
    --ink-light: #5a3e2b;
    --red: #8b1a1a;
    --red-light: #c44040;
    --blue: #1a3a5c;
    --bg: #1a1412;
    --card-bg: #faf6ec;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    background: linear-gradient(180deg, #0d0a08 0%, #1a1412 40%, #2c1810 100%);
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
    border-bottom: 3px solid var(--gold);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='none' stroke='%23c9a94e' stroke-width='0.3' opacity='0.08'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 2px 20px rgba(201,169,78,0.3);
    position: relative;
  }
  .hero .subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: var(--gold-light);
    opacity: 0.7;
    margin-top: 8px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  .calculator {
    background: linear-gradient(135deg, #2c1810, #1a1412);
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(201,169,78,0.2);
  }
  .calc-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    max-width: 800px;
    margin: 0 auto;
    overflow: visible;
  }
  .calc-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .calc-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    color: var(--gold-light);
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .year-input {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--gold);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--gold-dark);
    text-align: center;
    width: 5.5em;
    outline: none;
    transition: border-color 0.3s;
  }
  .year-input:focus { border-bottom-color: var(--gold-light); }
  .calc-operator {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.5;
  }
  .offset-input {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 600;
    color: var(--gold-light);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--gold-dark);
    text-align: center;
    width: 5.5em;
    outline: none;
    transition: border-color 0.3s;
  }
  .offset-input:focus { border-bottom-color: var(--gold-light); }
  .calc-equals {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    color: var(--gold);
    opacity: 0.5;
  }
  .result-year {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(201,169,78,0.5);
  }
  .result-suffix {
    font-size: 0.5em;
    color: var(--gold-light);
    margin-left: 5px;
  }

  .nav-bar {
    background: rgba(44, 24, 16, 0.95);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(201,169,78,0.15);
    backdrop-filter: blur(10px);
  }
  .nav-btn {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 8px 20px;
    border: 1px solid var(--gold-dark);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .nav-btn:hover { background: var(--gold-dark); color: #fff; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: transparent; color: var(--gold); }
  .nav-year-display {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    min-width: 120px;
    text-align: center;
  }

  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .period-card {
    background: var(--card-bg);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    margin-bottom: 30px;
    animation: fadeUp 0.5s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: linear-gradient(135deg, var(--red), #5a1010);
    padding: 25px 30px;
    position: relative;
    overflow: hidden;
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .card-header h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    color: #fff;
    font-weight: 700;
  }
  .card-header .pope-name {
    font-family: 'Crimson Text', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    margin-top: 5px;
    font-style: italic;
  }
  .card-header .modern-year {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .card-body { padding: 30px; }

  .card-body p {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .card-body p:last-child { margin-bottom: 0; }

  .evidence-label {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 25px;
    padding-top: 15px;
    border-top: 1px solid var(--parchment-dark);
  }

  .image-section {
    margin: 25px 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
  }
  .image-card {
    position: relative;
    overflow: hidden;
    border-radius: 3px;
    border: 1px solid var(--parchment-dark);
  }
  .image-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .image-card:hover img { transform: scale(1.03); }
  .image-caption {
    padding: 8px 12px;
    background: var(--parchment-dark);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    color: var(--ink-light);
    text-align: center;
  }

  .events-section {
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid var(--parchment-dark);
  }
  .events-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 15px;
  }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
    padding: 10px 15px;
    background: var(--parchment);
    border-left: 3px solid var(--gold);
    border-radius: 0 3px 3px 0;

  .event-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
  .event-text { font-size: 0.95rem; line-height: 1.5; color: var(--ink-light); }

  .doc-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
    padding: 12px 15px;
    background: #f0ead6;
    border-left: 3px solid var(--red);
    border-radius: 0 3px 3px 0;
  }
  .doc-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--ink);
  }
  .doc-text strong { color: var(--red); }

  .figures-section {
    margin-top: 20px;
    padding: 15px 20px;
    background: linear-gradient(135deg, var(--parchment), var(--parchment-dark));
    border-radius: 3px;
  }
  .figures-title {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-dark);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .figures-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .figure-tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    padding: 4px 12px;
    background: white;
    border: 1px solid var(--gold);
    border-radius: 20px;
    color: var(--ink);
  }

  .timeline-bar {
    background: rgba(44,24,16,0.95);
    padding: 15px 20px;
    overflow-x: auto;
    white-space: nowrap;
    text-align: center;
    border-top: 1px solid rgba(201,169,78,0.15);
  }
  .timeline-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    padding: 5px 10px;
    margin: 0 3px;
    background: transparent;
    border: 1px solid rgba(201,169,78,0.2);
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }
  .timeline-btn:hover, .timeline-btn.active {
    background: var(--gold-dark);
    color: #fff;
    border-color: var(--gold);
  }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
  }
  .loading .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid rgba(201,169,78,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 15px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    padding: 30px;
    background: var(--bg);
    color: rgba(201,169,78,0.4);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    border-top: 1px solid rgba(201,169,78,0.1);
  }

  @media (max-width: 600px) {
    .calc-row { gap: 8px; }
    .year-input { width: 5em; font-size: 1.6rem; }
    .offset-input { width: 5em; font-size: 1.2rem; }
    .calc-operator, .calc-equals { font-size: 1.4rem; }
    .result-year { font-size: 2rem !important; }
    .card-body { padding: 20px; }
    .image-section { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="hero">
  <h1>Rome Through the Ages</h1>
  <div class="subtitle">The 1260-Year Mirror</div>

774: {
  title: "The Fall of the Lombard Kingdom — Charlemagne Conquers Italy",
  pope: "Pope Hadrian I (772–795)",
  summary: [
    "In June 774, Charlemagne entered the Lombard capital of Pavia after a nine-month siege and formally annexed the Lombard kingdom. King Desiderius was captured, tonsured, and sent to the monastery of Corbie in Francia — the same fate the Carolingians had imposed on the last Merovingian king in 751. The Lombard kingdom, which had existed since 568, ceased to exist as an independent state.",
    "This was the beginning of a new political order in Italy. Charlemagne assumed the title 'Rex Francorum et Langobardorum atque Patricius Romanorum' — King of the Franks and Lombards and Patrician of the Romans. The title 'Patrician of the Romans' had been granted to Pepin by Pope Stephen II in 754, but Charlemagne's addition of 'King of the Lombards' was entirely new and deeply significant: it meant the Frankish king now directly ruled the territory that surrounded the Papal States on all sides.",
    "During Easter 774, before the fall of Pavia, Charlemagne had visited Rome and met with Hadrian I at St. Peter's. The Liber Pontificalis records that during this visit, Charlemagne confirmed and expanded the Donation of Pepin, promising additional territories including Spoleto, Benevento, Venetia, and Istria. A document recording these promises was reportedly placed on the altar of St. Peter's — though the exact extent of these promises has been debated by historians for centuries.",
    "The destruction of the Lombard kingdom was the beginning of a permanent Frankish presence in Italy. For the first time, the papacy no longer faced a hostile neighbor; instead, its protector now directly controlled the surrounding territory. This removed the immediate military threat but created a new dynamic: the pope was now entirely enclosed within Frankish-controlled territory. The protector had become the neighbor — and, potentially, the overlord."
  ],
  events: [
    { icon: "🏰", text: "June 774: Pavia falls after a 9-month siege — Charlemagne conquers the Lombard kingdom, ending 206 years of Lombard rule in Italy" },
    { icon: "👑", text: "Charlemagne assumes the title 'Rex Francorum et Langobardorum atque Patricius Romanorum' — King of the Franks AND Lombards AND Patrician of the Romans" },
    { icon: "⛪", text: "Easter 774: Charlemagne visits Rome and meets Hadrian I at St. Peter's — confirms and reportedly expands the Donation of Pepin" },
    { icon: "📜", text: "Liber Pontificalis records that Charlemagne promised Spoleto, Benevento, Venetia, and Istria to the papacy — the extent remains debated" },
    { icon: "🔒", text: "Desiderius captured, tonsured, and sent to the monastery of Corbie in Francia — identical fate to the last Merovingian" },
    { icon: "🗺️", text: "The Papal States are now entirely surrounded by Frankish-controlled territory — protection and encirclement become the same thing" },
    { icon: "⚔️", text: "Lombard duke Arichis II of Benevento refuses to submit — southern Italy remains outside Frankish control" }

    { text: "<strong>Charlemagne's 774 Donation document</strong>: Reportedly placed on St. Peter's altar. The original does not survive; its contents are known only from the Liber Pontificalis account, which some historians consider inflated." }
  ],

  ]
},

778: {
  title: "The Spanish Disaster and the Saxon Capitulary",
  pope: "Pope Hadrian I (772–795)",
  summary: [
    "In 778, Charlemagne suffered the most famous military defeat of his career: the destruction of his rearguard at the Battle of Roncevaux Pass on August 15, 778. The Basques (not Muslims, as later legend would claim) ambushed the Frankish rearguard as it crossed the Pyrenees retreating from an unsuccessful campaign in Spain. Among the dead was Roland, Prefect of the Breton March, whose death would later be immortalized in the 11th-century epic Chanson de Roland.",
    "This defeat is significant for papal history because it demonstrated the limits of Carolingian power — and therefore the limits of the papacy's military protector. Charlemagne's Spanish campaign had been partly motivated by an appeal from Muslim leaders in Zaragoza who sought Frankish help against the Umayyad emir of Córdoba. The failure showed that Charlemagne could not project power everywhere simultaneously.",
    "More directly relevant to Rome, 778 saw Charlemagne issue the earliest versions of the Capitulatio de partibus Saxoniae — the capitulary governing the forced conversion and administration of conquered Saxon territories. While the final version dates to 782-785, the policy framework was being developed by 778. This document is significant because it represents the first time a secular ruler legislated the death penalty for pagan religious practices, refusal of baptism, and violation of Christian fasting rules — and it was done explicitly with papal endorsement.",
    "Hadrian I supported Charlemagne's Saxon policy, providing theological justification for forced conversion. This papal endorsement of state-enforced Christianization was a beginning: it established the precedent that secular rulers could use lethal force to impose Christianity, with explicit papal approval. The partnership between papal spiritual authority and Carolingian military force was being applied not just to defend the Papal States but to expand Christendom by the sword."
  ],
  events: [
    { icon: "⚔️", text: "August 15, 778: Battle of Roncevaux Pass — Charlemagne's rearguard destroyed by Basques; Roland killed" },
    { icon: "📜", text: "778-782: Development of the Capitulatio de partibus Saxoniae — death penalty for pagan practices, refusal of baptism, and violation of Christian law" },
    { icon: "⛪", text: "Hadrian I provides theological endorsement for Charlemagne's forced conversion policy in Saxony" },
    { icon: "🗡️", text: "Beginning of the precedent: secular rulers can impose Christianity by lethal force with papal approval" },
    { icon: "🌍", text: "Charlemagne's Spanish failure demonstrates limits of Frankish military power — he cannot protect Rome AND expand simultaneously" },
    { icon: "🏛️", text: "Hadrian I continues consolidating papal governance of the Papal States during Charlemagne's absence in Spain and Saxony" }
  ],
  documents: [
    { text: "<strong>Capitulatio de partibus Saxoniae (c. 782-785)</strong>: Charlemagne's capitulary for Saxony. Imposes death penalty for: refusing baptism, practicing pagan rites, cremating the dead, violating Lenten fasting. The harshest religious legislation of the early Middle Ages." },
    { text: "<strong>Royal Frankish Annals (778)</strong>: Records the Spanish campaign and the Roncevaux disaster. The entry is notably brief about the defeat — later revised versions add detail." },
    { text: "<strong>Einhard's Vita Karoli Magni (c. 830)</strong>: Names Roland as one of those killed at Roncevaux — the earliest surviving reference to Roland by name." }
  ],
  figures: ["Pope Hadrian I", "Charlemagne", "Roland (Prefect of the Breton March, killed)", "Widukind (Saxon leader)", "Alcuin of York"],
  images: [
    { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Charlemagne-by-Durer.jpg/250px-Charlemagne-by-Durer.jpg", caption: "Charlemagne — whose military campaigns had direct consequences for papal power" }
  ]
},

781: {
  title: "Charlemagne's Second Visit to Rome — His Sons Anointed by the Pope",
  pope: "Pope Hadrian I (772–795)",
  summary: [
    "On Easter Saturday, April 15, 781, Pope Hadrian I baptized Charlemagne's four-year-old son Carloman (renaming him Pepin) and anointed him as King of Italy. Simultaneously, Hadrian anointed Charlemagne's three-year-old son Louis as King of Aquitaine. This ceremony was the first time a pope had personally baptized and anointed the sons of a ruling king as sub-kings of specific territories.",
    "The significance of this act was immense. By performing the baptism and anointing himself, Hadrian I was asserting that royal legitimacy flowed through papal hands. Pepin's kingship of Italy was not merely his father's appointment — it was a papal consecration. This established a new precedent: the pope could create kings, not just emperors. The papal role in legitimizing Carolingian succession was expanding from a one-time event (Zacharias's approval of Pepin the Short in 750) into a systematic practice.",
    "Charlemagne's 781 visit also resulted in major diplomatic negotiations. The Liber Pontificalis records discussions about the boundaries of the Papal States, with Charlemagne reportedly agreeing to expanded territorial grants. There were also diplomatic contacts with the Byzantine Empire: Charlemagne negotiated a betrothal between his daughter Rotrude and the young Byzantine Emperor Constantine VI — a marriage alliance that would have united the Frankish and Byzantine dynasties (though it was later cancelled).",
    "The 781 visit also saw the beginning of a close personal relationship between Charlemagne and Alcuin of York, whom Charlemagne had met earlier in Parma. Alcuin would become the chief architect of the Carolingian Renaissance and Charlemagne's principal advisor on theological matters. The intellectual program that Alcuin developed — with Hadrian I's active support — would provide the ideological framework for Charlemagne's future claim to the imperial title."
  ],
  events: [
    { icon: "💧", text: "April 15, 781 (Easter Saturday): Hadrian I personally baptizes Charlemagne's son Carloman, renaming him Pepin" },
    { icon: "👑", text: "Same ceremony: Hadrian I anoints young Pepin as King of Italy and Louis as King of Aquitaine — first papal anointing of sub-kings" },
    { icon: "📜", text: "First time a pope creates kings of specific territories through personal anointing — expanding papal role beyond one-time legitimation" },
    { icon: "💍", text: "Negotiations for betrothal of Charlemagne's daughter Rotrude to Byzantine Emperor Constantine VI — later cancelled" },
    { icon: "📚", text: "Charlemagne recruits Alcuin of York as court scholar — beginning of the Carolingian Renaissance's intellectual program" },
    { icon: "🗺️", text: "Boundary negotiations: Charlemagne reportedly agrees to expanded Papal States territory" },
    { icon: "🤝", text: "Hadrian I serves as godfather (spiritual father) to Charlemagne's son — creating a spiritual kinship between pope and king" }
  ],
  documents: [
    { text: "<strong>Liber Pontificalis (Life of Hadrian I)</strong>: Records the 781 visit in detail, including the baptism, anointings, territorial discussions, and Byzantine negotiations." },
    { text: "<strong>Royal Frankish Annals (781)</strong>: Confirms the baptism and anointing of Pepin and Louis by the pope." },

  ]
},

787: {
  title: "The Second Council of Nicaea — Papal Doctrine Prevails Over Iconoclasm",
  pope: "Pope Hadrian I (772–795)",
  summary: [
    "In September-October 787, the Second Council of Nicaea — the Seventh Ecumenical Council — formally condemned iconoclasm and restored the veneration of images throughout Christendom. This council was convened by Byzantine Empress Irene and her son Constantine VI, but it was Pope Hadrian I's legates who presided and whose theological position prevailed. The council's decrees represented a decisive papal victory in the theological dispute that had begun in 726.",
    "Hadrian I sent two legates — the archpriest Peter and the abbot Peter of the monastery of St. Sabas — to represent the Roman position. Their instructions, preserved in Hadrian's letter to the council (the Epistola Hadriani), laid out the papal theology of images: icons were to be venerated (but not worshipped with the adoration due only to God), and iconoclasm was condemned as heresy. The council accepted the papal position and issued canons accordingly.",
    "The council's acceptance of papal legates as presiding authorities was itself a significant precedent. The Eastern bishops acknowledged that a legitimate ecumenical council required Roman participation and that the papal position carried decisive authority in doctrinal disputes. This was the last ecumenical council recognized by both Eastern and Western churches — and the last time Eastern bishops formally deferred to Roman theological leadership.",
    "Paradoxically, Charlemagne rejected the council's decisions. His theologians produced the Libri Carolini (Caroline Books, c. 790-793), which criticized both iconoclasm AND the council's pro-icon position, advocating a middle way. This disagreement between pope and king on theological matters is significant evidence: it shows that the papal-Frankish alliance was not a relationship of subordination. Hadrian I maintained his theological position against Charlemagne's objections — the pope held doctrinal authority even when his military protector disagreed."
  ],
  events: [
    { icon: "⛪", text: "September-October 787: Second Council of Nicaea convened — the Seventh Ecumenical Council, last recognized by both East and West" },
    { icon: "📜", text: "Hadrian I's Epistola Hadriani sent to the council — defines the papal theology of icons: veneration permitted, worship reserved for God alone" },
    { icon: "🤝", text: "Papal legates Peter (archpriest) and Peter (abbot) preside at the council — Eastern bishops accept Roman authority in doctrinal matters" },
    { icon: "✅", text: "Council condemns iconoclasm as heresy and restores icon veneration — ending the controversy that began in 726 (61 years)" },
    { icon: "❌", text: "Charlemagne REJECTS the council's decisions — his theologians begin preparing the Libri Carolini in response" },
    { icon: "⚖️", text: "Hadrian I maintains his pro-icon position against Charlemagne's objections — demonstrating papal doctrinal independence from the Frankish king" },
    { icon: "🌍", text: "Last ecumenical council recognized by both Catholic and Orthodox churches — a moment of theological unity that would not recur" }
  ],
  documents: [
    { text: "<strong>Epistola Hadriani (787)</strong>: Hadrian I's letter to the Second Council of Nicaea. Defines the theology of image veneration and instructs papal legates on the position to advocate." },
    { text: "<strong>Canons of the Second Council of Nicaea (787)</strong>: 22 canons restoring icon veneration, condemning iconoclasm, and regulating church discipline." },
    { text: "<strong>Libri Carolini (c. 790-793)</strong>: Charlemagne's theological response rejecting the council. Argues for a middle position between iconoclasm and the council's pro-icon stance. Evidence that the pope maintained doctrinal independence from his protector." }
  ],

  images: [
    { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Byzantinischer_Mosaizist_um_1000_002.jpg/300px-Byzantinischer_Mosaizist_um_1000_002.jpg", caption: "Byzantine icon mosaic — the veneration of such images was the council's central issue" }
  ]
},

790: {
  title: "The Libri Carolini — Charlemagne Challenges Papal Theology",
  pope: "Pope Hadrian I (772–795)",
  summary: [
    "By 790, the theological fallout from the Second Council of Nicaea (787) had produced one of the most remarkable documents of the early Middle Ages: the Libri Carolini (Caroline Books). Commissioned by Charlemagne and composed primarily by Theodulf of Orléans, this four-book treatise rejected both the iconoclast position AND the council's pro-icon decrees — arguing instead for a middle position in which images were permitted but not venerated.",
    "The Libri Carolini directly challenged papal authority on a doctrinal matter. Charlemagne's theologians argued that the Second Council of Nicaea had erred, that Hadrian I's legates had been wrong to endorse its conclusions, and that the Frankish church maintained the correct theological position. This was an extraordinary assertion: the king was claiming theological authority over the pope.",
    "Hadrian I responded with a detailed letter (the Hadrianum) defending the council's decisions and his own theological position. He refuted the Libri Carolini point by point, maintaining that icon veneration was sound doctrine and that the council's authority — ratified by papal legates — was binding. The Hadrianum is one of the most intellectually rigorous papal documents of the 8th century.",
    "This theological dispute is critical evidence of how the papal-Frankish relationship actually functioned. Despite total military dependence on Charlemagne, Hadrian I refused to yield on doctrinal matters. The pope maintained that his theological authority was independent of Frankish military protection. The Libri Carolini were never officially promulgated — Charlemagne apparently decided not to force a public break with the pope over theology. But the document survives in manuscript form, evidence of a disagreement that reveals the true boundaries of their partnership."
  ],
  events: [
    { icon: "📖", text: "c. 790-793: Libri Carolini composed by Theodulf of Orléans on Charlemagne's orders — 4 books challenging the Second Council of Nicaea" },
    { icon: "⚖️", text: "Charlemagne's theologians claim the right to correct papal theology — asserting Frankish theological authority over Roman doctrine" },
    { icon: "📜", text: "Hadrian I responds with the Hadrianum — a point-by-point refutation of the Libri Carolini defending the council and papal authority" },
    { icon: "🤫", text: "Libri Carolini never officially promulgated — Charlemagne chooses not to force a public break with the pope" },
    { icon: "🏛️", text: "Frankfurt Council planned (held 794): will address the dispute and issue Frankish position on images" },
    { icon: "💡", text: "Alcuin of York becomes primary intellectual force at Charlemagne's court — driving the Carolingian Renaissance" },
    { icon: "🌍", text: "Charlemagne's empire continues expanding — Saxon wars ongoing, Avar campaigns beginning" }
  ],
  documents: [
    { text: "<strong>Libri Carolini (c. 790-793)</strong>: Four-book theological treatise rejecting the Second Council of Nicaea. Composed by Theodulf of Orléans. The sole surviving manuscript (Vatican, Codex Vaticanus Latinus 7207) contains annotations in Charlemagne's own hand." },
    { text: "<strong>Hadrianum (c. 791)</strong>: Hadrian I's formal response to the Libri Carolini. A detailed theological defense of the Second Council of Nicaea and papal doctrinal authority." },
    { text: "<strong>Codex Carolinus</strong>: Compiled in 791 on Charlemagne's orders, this collection of papal letters preserves the correspondence between popes and Frankish rulers from 739-791, including the theological exchanges of this period." }

  ]
},

793: {
  title: "The Viking Age Begins — Lindisfarne Sacked",
  pope: "Pope Hadrian I (772–795)",
  summary: [
    "On June 8, 793, Norse raiders attacked the monastery of Lindisfarne off the coast of Northumbria — an event traditionally marking the beginning of the Viking Age. While this occurred far from Rome, its consequences would profoundly affect the papacy within two generations. The Viking raids would devastate the monasteries, churches, and trade networks of northern Europe, destabilizing the Carolingian order that protected the papacy.",
    "Alcuin of York, Charlemagne's chief intellectual advisor and a Northumbrian himself, wrote anguished letters about the attack. His letter to King Æthelred of Northumbria is one of the most famous documents of the early Middle Ages: 'Never before has such a terror appeared in Britain as we have now suffered from a pagan race... The church of St. Cuthbert is spattered with the blood of the priests of God.' Alcuin also wrote to Hadrian I about the attack, connecting it to broader concerns about the security of Christendom.",
    "For the papacy, the significance of 793 lies in what it portended. The Viking raids would, within decades, shatter the Carolingian empire's ability to project power and protect its allies. The monastery-based learning network that supported both Carolingian and papal governance would be systematically destroyed across northern Europe. The Frankish military resources that guaranteed the Papal States' security would be increasingly diverted to defending the empire's northern and western coastlines.",
    "In Rome itself, 793 was a year of continued cooperation between Hadrian I and Charlemagne. The Carolingian Renaissance was in full flower: manuscripts were being copied, schools established, and liturgical reform proceeding. Charlemagne's court was also preparing for the Council of Frankfurt (794), which would address the Adoptionist heresy and the ongoing dispute over image veneration — maintaining the pattern of joint papal-Frankish governance of the Western church."
  ],
  events: [
    { icon: "⚔️", text: "June 8, 793: Norse raiders attack Lindisfarne monastery — traditional beginning of the Viking Age" },
    { icon: "✉️", text: "Alcuin of York writes anguished letters to King Æthelred and to Hadrian I about the attack on Lindisfarne" },
    { icon: "⚠️", text: "Beginning of a pattern: Viking raids will progressively destabilize the Carolingian order that protects the papacy" },
    { icon: "📚", text: "Carolingian Renaissance continues — manuscripts copied, schools established, liturgical reforms proceeding" },
    { icon: "⛪", text: "Preparations for the Council of Frankfurt (794) — will address Adoptionist heresy and image veneration" },
    { icon: "🏛️", text: "Hadrian I and Charlemagne continue governing the Western church as joint partners — the alliance at its most productive" }
  ],
  documents: [
    { text: "<strong>Alcuin's Letter to Æthelred of Northumbria (793)</strong>: 'Never before has such a terror appeared in Britain...' One of the most famous documents of the early Middle Ages. Preserved in multiple manuscript copies." },
    { text: "<strong>Anglo-Saxon Chronicle (793)</strong>: Records the Lindisfarne attack: 'In this year terrible portents appeared over Northumbria... and a little after that the harrying of the heathen miserably destroyed God's church in Lindisfarne.'" }
  ],

  ]
},

795: {
  title: "The Death of Hadrian I — Charlemagne Weeps",
  pope: "Pope Leo III (elected 795)",
  summary: [
    "On December 25, 795 (some sources say December 26), Pope Hadrian I died after a pontificate of 23 years and 10 months — the longest of any pope in the 8th century and one of the longest in papal history to that date. His death profoundly affected Charlemagne, who reportedly wept as though he had lost a father or brother. Einhard's Vita Karoli Magni records Charlemagne's grief, and the king commissioned an elaborate marble epitaph in gold letters for Hadrian's tomb — one of the few surviving examples of Carolingian epigraphy.",
    "Hadrian's death marked the end of the most productive papal-royal partnership of the early Middle Ages. The two men had cooperated for 23 years: Charlemagne had destroyed the Lombard kingdom, expanded and defended the Papal States, funded Roman churches, and supported papal authority — while Hadrian had legitimized Charlemagne's conquests, baptized and anointed his sons, and provided the theological framework for Carolingian rule.",
    "On the very day after Hadrian's death (December 26 or 27, 795), the Roman clergy elected Leo III as his successor. The speed of the election was remarkable — and telling. Leo III came from modest origins (unlike the aristocratic Hadrian I), and his rapid election suggests that a faction within the Roman clergy wanted to prevent any outside interference in the succession. Leo immediately sent Charlemagne the keys of St. Peter's Confession and the banner of Rome — traditional symbols of the papal-Frankish alliance.",
    "Charlemagne's response to Leo III's accession was revealing. He sent a letter (preserved in the Codex Carolinus) that laid bare the true power dynamic: 'It is our part to defend by armed strength the holy Church of Christ... it is your part, most holy Father, to aid our armies with your hands lifted up to God.' This was not a request — it was a statement of how things were. The king defended; the pope prayed. Charlemagne was defining the relationship in terms that left little doubt about who held temporal supremacy."
  ],
  events: [
    { icon: "⚰️", text: "December 25, 795: Pope Hadrian I dies after 23 years and 10 months — one of the longest pontificates in history to that date" },
    { icon: "😢", text: "Charlemagne weeps at the news — commissions a marble epitaph in gold letters for Hadrian's tomb (the stone survives today in St. Peter's portico)" },
    { icon: "👑", text: "December 26-27, 795: Leo III elected pope with extraordinary speed — from modest (non-aristocratic) origins" },
    { icon: "🗝️", text: "Leo III immediately sends Charlemagne the keys of St. Peter's Confession and the banner of Rome — symbols of alliance" },
    { icon: "📜", text: "Charlemagne's letter to Leo III defines roles: 'It is our part to defend... it is your part to pray' — the king explicitly claims temporal supremacy" },
    { icon: "⚠️", text: "Roman aristocratic factions that had supported Hadrian I are hostile to the non-aristocratic Leo III — conspiracies begin forming" }
  ],
  documents: [
    { text: "<strong>Einhard's Vita Karoli Magni (c. 830)</strong>: Records Charlemagne's grief at Hadrian I's death and describes their close personal relationship over 23 years." },
    { text: "<strong>Charlemagne's epitaph for Hadrian I</strong>: Carved in marble with gold letters, placed at Hadrian's tomb. The stone survives today in the portico of St. Peter's Basilica — one of the few surviving examples of Carolingian memorial epigraphy." },
    { text: "<strong>Charlemagne's letter to Leo III (796)</strong>: 'It is our part to defend by armed strength the holy Church of Christ... it is your part, most holy Father, to aid our armies with your hands lifted up to God.' Defines the papal-royal relationship in terms of complementary but unequal authority." }
  ],
  figures: ["Pope Hadrian I (deceased)", "Pope Leo III (elected)", "Charlemagne", "Einhard (Charlemagne's biographer)", "Roman aristocratic factions"],
  images: [
    { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Leo_III_and_Charlemagne.jpg/300px-Leo_III_and_Charlemagne.jpg", caption: "Pope Leo III and Charlemagne — a new and more unequal relationship" }
  ]
},

798: {
  title: "Leo III Under Siege — The Lateran Mosaic Declares a New Order",
  pope: "Pope Leo III (795–816)",
  summary: [
    "By 798, Leo III had been pope for two years and was working to consolidate his authority against a hostile Roman aristocracy. His most visible act of propaganda was the commissioning of a mosaic in the apse of the Lateran Palace triclinium (banqueting hall) that depicted the new political order in explicitly visual terms. The mosaic — fragments of which survive in a later copy — showed two parallel scenes: on the left, Christ giving the keys to St. Peter and the labarum (military standard) to Emperor Constantine; on the right, St. Peter giving the pallium to Leo III and the vexillum (banner) to Charlemagne.",
    "The Lateran triclinium mosaic was an extraordinary piece of political iconography. By placing Charlemagne parallel to Emperor Constantine — and Leo III parallel to St. Peter himself — the mosaic asserted that the Frankish king was the new Constantine and that the papal-Frankish alliance was the divinely ordained successor to the original Christian Roman Empire. This was the first visual representation of the idea that would culminate in Charlemagne's imperial coronation two years later.",
    "Meanwhile, Leo III faced escalating personal danger. The Roman aristocrats Paschalis (the primicerius, or chief notary) and Campulus (the sacellarius, or treasurer) were building a conspiracy against him. Their faction accused Leo of perjury and adultery — charges that would later be used to justify a violent attack. The Liber Pontificalis and Frankish sources indicate that these conspirators were connected to the family networks that had supported Hadrian I and resented Leo's non-aristocratic origins.",
    "Leo III responded to the growing threat by strengthening his ties to Charlemagne. He sent lavish gifts to the Frankish court, including portions of the chain that had bound St. Peter in prison. He also sent detailed reports about the military situation in Italy, positioning himself as Charlemagne's indispensable informant in Rome. Every action was calculated to ensure that when the crisis came, Charlemagne would intervene on his behalf."

  return currentTopYear - currentOffset;
}

function getDataYears() {
  return Object.keys(historicalData).map(Number).sort((a, b) => a - b);
}

function findNearestData(year) {
  const years = getDataYears();
  if (historicalData[year]) return year;
  let nearest = years[0];
  let minDist = Math.abs(year - nearest);
  for (const y of years) {
    const dist = Math.abs(year - y);
    if (dist < minDist) { minDist = dist; nearest = y; }
  }
  return nearest;
}

function renderContent() {
  const histYear = getHistoricalYear();
  const suffix = histYear > 0 ? 'AD' : 'BC';
  const displayYear = histYear > 0 ? histYear : Math.abs(histYear);

  document.getElementById('resultYear').innerHTML = `${displayYear}<span class="result-suffix">${suffix}</span>`;
  document.getElementById('navDisplay').textContent = currentTopYear;

  const content = document.getElementById('mainContent');
  const dataYear = findNearestData(histYear);
  const data = historicalData[dataYear];

  if (!data || Math.abs(dataYear - histYear) > 15) {
    content.innerHTML = `
      <div class="period-card">
        <div class="card-body" style="text-align:center; padding: 60px 30px;">
          <h3 style="font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--red); margin-bottom: 15px;">${displayYear} ${suffix}</h3>
          <p style="font-size: 1.1rem; color: var(--ink-light); max-width: 500px; margin: 0 auto; line-height: 1.6;">
            Detailed records for this exact year are beyond our current database.
            Use the navigation buttons to browse available entries.
          </p>
        </div>
      </div>`;
    renderTimeline(histYear);
    updateNavButtons();
    return;
  }

  const isExact = dataYear === histYear;
  const modernYear = dataYear + currentOffset;
  const nearestNote = isExact ? '' : `<div style="padding: 10px 30px; background: var(--parchment); font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--ink-light);">Showing nearest available year: <strong>${dataYear} AD</strong> (your calculated year: ${histYear} AD)</div>`;

  let imagesHtml = '';
  if (data.images && data.images.length > 0) {
    imagesHtml = `<div class="image-section">${data.images.map(img => `
      <div class="image-card">
        <img src="${img.url}" alt="${img.caption}" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="image-caption">${img.caption}</div>
      </div>`).join('')}</div>`;
  }

  const eventsHtml = data.events.map(e => `
    <div class="event-item">
      <span class="event-icon">${e.icon}</span>
      <span class="event-text">${e.text}</span>
    </div>`).join('');

  let docsHtml = '';
  if (data.documents && data.documents.length > 0) {
    docsHtml = `
      <div class="evidence-label">Primary Sources & Documents</div>
      ${data.documents.map(d => `<div class="doc-item"><span class="event-icon">📄</span><span class="doc-text">${d.text}</span></div>`).join('')}`;
  }

  const figuresHtml = data.figures.map(f => `<span class="figure-tag">${f}</span>`).join('');
  const summaryHtml = data.summary.map(p => `<p>${p}</p>`).join('');

  content.innerHTML = `
    <div class="period-card">
      ${nearestNote}
      <div class="card-header">
        <h2>${dataYear} AD — ${data.title}</h2>
        <div class="pope-name">${data.pope}</div>
        <div class="modern-year">Modern mirror: ${modernYear} AD</div>
      </div>
      <div class="card-body">
        ${summaryHtml}
        ${imagesHtml}
        <div class="events-section">
          <div class="events-title">Key Events & Evidence</div>
          ${eventsHtml}
        </div>
        ${docsHtml}
        <div class="figures-section">
          <div class="figures-title">Notable Figures</div>
          <div class="figures-list">${figuresHtml}</div>
        </div>
      </div>
    </div>`;

  renderTimeline(histYear);
  updateNavButtons();
}

function renderTimeline(currentYear) {
  const bar = document.getElementById('timelineBar');
  const years = getDataYears();
  bar.innerHTML = years.map(y => {
    const isActive = findNearestData(currentYear) === y;
    const modernY = y + currentOffset;
    return `<button class="timeline-btn ${isActive ? 'active' : ''}" onclick="jumpToYear(${y})" title="${y} AD (${modernY})">${y}</button>`;
  }).join('');
}

function jumpToYear(year) {
  currentTopYear = year + currentOffset;
  if (currentTopYear < MIN_YEAR) currentTopYear = MIN_YEAR;
  if (currentTopYear > MAX_YEAR) currentTopYear = MAX_YEAR;
  document.getElementById('topYear').value = currentTopYear;
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function stepNext() {
  const years = getDataYears();
  const currentHist = getHistoricalYear();
  const currentData = findNearestData(currentHist);
  const idx = years.indexOf(currentData);
  if (idx < years.length - 1) {
    const nextYear = years[idx + 1];
    const nextModern = nextYear + currentOffset;
    if (nextModern <= MAX_YEAR) {
      jumpToYear(nextYear);
    }
  }
  updateNavButtons();
}

function stepPrev() {
  const years = getDataYears();
  const currentHist = getHistoricalYear();
  const currentData = findNearestData(currentHist);
  const idx = years.indexOf(currentData);
  if (idx > 0) {
    const prevYear = years[idx - 1];
    const prevModern = prevYear + currentOffset;
    if (prevModern >= MIN_YEAR) {
      jumpToYear(prevYear);
    }
  }
  updateNavButtons();
}

function updateNavButtons() {
  const years = getDataYears();
  const currentHist = getHistoricalYear();
  const currentData = findNearestData(currentHist);
  const idx = years.indexOf(currentData);

  const atStart = idx <= 0 || (years[idx - 1] + currentOffset) < MIN_YEAR;
  const atEnd = idx >= years.length - 1 || (years[idx + 1] + currentOffset) > MAX_YEAR;

  document.getElementById('prevBtn').disabled = atStart;
  document.getElementById('nextBtn').disabled = atEnd;
}

// ─── Event Listeners ───
document.getElementById('topYear').addEventListener('input', function() {
  let val = parseInt(this.value);
  if (!isNaN(val)) {
    if (val < MIN_YEAR) val = MIN_YEAR;
    if (val > MAX_YEAR) val = MAX_YEAR;
    currentTopYear = val;
    renderContent();
  }
});

document.getElementById('offset').addEventListener('input', function() {
  const val = parseInt(this.value);
  if (!isNaN(val)) {
    currentOffset = val;
    renderContent();
  }
});

// ─── Initialize ───
renderContent();
</script>
</body>
</html>
