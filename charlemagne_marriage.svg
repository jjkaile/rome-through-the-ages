<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <style>
    .pencil {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .light {
      fill: none;
      stroke: #8a8a8a;
      stroke-width: 0.8;
      stroke-linecap: round;
    }
    .construction {
      fill: none;
      stroke: #b0b0b0;
      stroke-width: 0.5;
      stroke-dasharray: 4 3;
    }
    .heavy {
      fill: none;
      stroke: #3a3a3a;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .crack {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 2.0;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .label {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      fill: #5a5a5a;
    }
    .title-text {
      font-family: 'Georgia', 'Times New Roman', serif;
      fill: #3a3a3a;
    }
    .subtitle {
      font-family: 'Courier New', monospace;
      fill: #7a7a7a;
    }
    .kingdom-label {
      font-family: 'Georgia', serif;
      fill: #5a5a5a;
      font-style: italic;
    }
    .verse {
      font-family: 'Georgia', serif;
      fill: #6a6a6a;
      font-style: italic;
    }
    .banner-line {
      fill: none;
      stroke: #5a5a5a;
      stroke-width: 1.2;
      stroke-linecap: round;
    }
  </style>

  <!-- ══════ TOP: THE INTRODUCTIONS — like a fight card ══════ -->

  <!-- Left side: CHARLEMAGNE dynasty intro -->
  <text class="subtitle" x="130" y="42" text-anchor="middle" style="font-size: 10px; letter-spacing: 3px;">INTRODUCING</text>

  <text class="title-text" x="130" y="72" text-anchor="middle" style="font-size: 14px; fill: #7a7a7a;">Charles Martel</text>
  <text class="subtitle" x="130" y="88" text-anchor="middle" style="font-size: 10px;">a.k.a. "The Hammer"</text>
  <text class="subtitle" x="130" y="102" text-anchor="middle" style="font-size: 9px; fill: #999;">(grandpa)</text>

  <!-- Arrow down -->
  <line class="light" x1="130" y1="108" x2="130" y2="120" />
  <path class="light" d="M 125,116 L 130,122 L 135,116" />

  <text class="title-text" x="130" y="140" text-anchor="middle" style="font-size: 14px; fill: #7a7a7a;">Pepin the Short</text>
  <text class="subtitle" x="130" y="156" text-anchor="middle" style="font-size: 9px; fill: #999;">(dad)</text>

  <!-- Arrow down -->
  <line class="light" x1="130" y1="162" x2="130" y2="174" />
  <path class="light" d="M 125,170 L 130,176 L 135,170" />

  <text class="title-text" x="130" y="200" text-anchor="middle" style="font-size: 22px; font-weight: bold;">CHARLEMAGNE</text>
  <text class="subtitle" x="130" y="220" text-anchor="middle" style="font-size: 11px;">"Charles the Great"</text>
  <text class="subtitle" x="130" y="236" text-anchor="middle" style="font-size: 10px; fill: #999;">King of the Franks</text>

  <!-- Right side: DESIDERATA intro -->
  <text class="subtitle" x="770" y="42" text-anchor="middle" style="font-size: 10px; letter-spacing: 3px;">AND</text>

  <text class="title-text" x="770" y="120" text-anchor="middle" style="font-size: 14px; fill: #7a7a7a;">Desiderius</text>
  <text class="subtitle" x="770" y="138" text-anchor="middle" style="font-size: 10px;">King of the Lombards</text>
  <text class="subtitle" x="770" y="152" text-anchor="middle" style="font-size: 9px; fill: #999;">(dad)</text>

  <!-- Arrow down -->
  <line class="light" x1="770" y1="158" x2="770" y2="170" />
  <path class="light" d="M 765,166 L 770,172 L 775,166" />

  <text class="title-text" x="770" y="200" text-anchor="middle" style="font-size: 22px; font-weight: bold;">DESIDERATA</text>
  <text class="subtitle" x="770" y="220" text-anchor="middle" style="font-size: 11px;">"The Lombard Princess"</text>
  <text class="subtitle" x="770" y="236" text-anchor="middle" style="font-size: 10px; fill: #999;">Daughter of Lombardy</text>

  <!-- Center: VS / marriage symbol -->
  <text class="title-text" x="450" y="140" text-anchor="middle" style="font-size: 12px; fill: #aaa; letter-spacing: 5px;">770 AD</text>

  <!-- Heart shape (marriage) — but cracked -->
  <path class="pencil" d="
    M 450,165
    C 450,155 440,148 432,148
    C 420,148 415,160 415,168
    C 415,185 435,200 450,215
  " />
  <path class="pencil" d="
    M 450,165
    C 450,155 460,148 468,148
    C 480,148 485,160 485,168
    C 485,185 465,200 450,215
  " />
  <!-- Crack through the heart -->
  <path class="crack" d="M 448,155 L 452,172 L 445,188 L 455,205 L 450,215" />

  <text class="subtitle" x="450" y="235" text-anchor="middle" style="font-size: 10px; fill: #999;">~ 1 year later: DIVORCED ~</text>

  <!-- ══════ CENTER: DIVIDING LINE / CRACK — iron + clay ══════ -->
  <!-- Big jagged crack running down the middle -->
  <path class="heavy" d="
    M 450,255
    L 445,275
    L 455,295
    L 442,320
    L 458,345
    L 440,370
    L 460,395
    L 443,420
    L 457,445
    L 441,470
    L 456,495
    L 445,520
  " />

  <!-- Small cracks branching off -->
  <path class="light" d="M 445,275 L 435,282" />
  <path class="light" d="M 455,295 L 465,288" />
  <path class="light" d="M 442,320 L 430,325" />
  <path class="light" d="M 458,345 L 470,340" />
  <path class="light" d="M 440,370 L 428,375" />
  <path class="light" d="M 460,395 L 472,390" />
  <path class="light" d="M 443,420 L 432,428" />
  <path class="light" d="M 457,445 L 468,440" />

  <!-- Left side label: IRON -->
  <text class="title-text" x="390" y="400" text-anchor="end" style="font-size: 18px; fill: #7a7a7a; letter-spacing: 3px;">IRON</text>

  <!-- Right side label: CLAY -->
  <text class="title-text" x="510" y="400" text-anchor="start" style="font-size: 18px; fill: #7a7a7a; letter-spacing: 3px;">CLAY</text>

  <!-- ══════ LEFT: CHARLEMAGNE figure ══════ -->

  <!-- Crown -->
  <path class="pencil" d="
    M 190,295
    L 185,275
    L 195,282
    L 205,268
    L 215,282
    L 225,270
    L 235,282
    L 245,275
    L 240,295
    Z
  " />
  <!-- Crown cross on top -->
  <line class="pencil" x1="215" y1="268" x2="215" y2="258" />
  <line class="pencil" x1="210" y1="263" x2="220" y2="263" />

  <!-- Head -->
  <path class="pencil" d="
    M 192,295
    C 188,310 186,325 188,340
    C 190,355 198,368 215,375
    C 232,368 240,355 242,340
    C 244,325 242,310 238,295
  " />

  <!-- Face -->
  <ellipse class="light" cx="203" cy="320" rx="7" ry="4" />
  <ellipse class="light" cx="227" cy="320" rx="7" ry="4" />
  <path class="light" d="M 215,322 L 213,338 C 211,342 210,343 208,342" />
  <!-- Big mustache -->
  <path class="pencil" d="M 200,348 C 205,355 210,356 215,354 C 220,356 225,355 230,348" />
  <path class="pencil" d="M 200,348 C 196,352 192,354 188,352" />
  <path class="pencil" d="M 230,348 C 234,352 238,354 242,352" />
  <!-- Beard -->
  <path class="pencil" d="
    M 195,355 C 198,370 205,382 215,388
    C 225,382 232,370 235,355
  " />
  <path class="light" d="M 205,360 C 208,375 212,382 215,385" />
  <path class="light" d="M 225,360 C 222,375 218,382 215,385" />

  <!-- Broad shoulders + armor -->
  <path class="pencil" d="
    M 192,375
    C 170,382 148,392 130,405
    C 120,412 115,420 112,430
  " />
  <path class="pencil" d="
    M 238,375
    C 260,382 282,392 300,405
    C 310,412 315,420 318,430
  " />

  <!-- Chest plate -->
  <path class="pencil" d="
    M 130,405
    C 128,430 130,460 140,485
    C 155,500 185,510 215,512
    C 245,510 275,500 290,485
    C 300,460 302,430 300,405
  " />

  <!-- Cross on chest plate -->
  <line class="pencil" x1="215" y1="420" x2="215" y2="475" />
  <line class="pencil" x1="190" y1="445" x2="240" y2="445" />

  <!-- Armor detail lines -->
  <path class="light" d="M 150,420 C 165,428 190,432 215,430" />
  <path class="light" d="M 280,420 C 265,428 240,432 215,430" />

  <!-- Sword (left hand) -->
  <path class="pencil" d="
    M 118,430
    C 115,445 110,460 108,480
    L 105,520
    L 102,530
  " />
  <!-- Sword blade -->
  <path class="pencil" d="
    M 102,530
    L 98,535
    L 95,610
    L 100,618
    L 105,610
    L 108,535
    L 102,530
  " />
  <!-- Sword guard -->
  <line class="pencil" x1="88" y1="530" x2="118" y2="528" />
  <!-- Pommel -->
  <circle class="pencil" cx="102" cy="520" r="5" />

  <!-- Belt -->
  <path class="pencil" d="M 140,488 C 165,495 195,498 215,498 C 235,498 265,495 290,488" />

  <!-- ══════ RIGHT: DESIDERATA figure ══════ -->

  <!-- Veil / headdress flowing -->
  <path class="pencil" d="
    M 660,290
    C 655,285 660,275 670,272
    C 680,270 695,270 705,272
    C 715,275 720,285 715,290
  " />
  <!-- Veil draping down -->
  <path class="pencil" d="M 660,290 C 655,310 650,340 648,370 C 646,400 648,420 652,435" />
  <path class="pencil" d="M 715,290 C 720,310 725,340 727,370 C 729,400 727,420 723,435" />
  <!-- Veil fabric folds -->
  <path class="light" d="M 665,310 C 663,330 660,350 658,370" />
  <path class="light" d="M 710,310 C 712,330 715,350 717,370" />

  <!-- Head / face -->
  <path class="pencil" d="
    M 665,290
    C 662,305 660,318 662,332
    C 665,348 675,360 688,365
    C 700,360 710,348 713,332
    C 715,318 713,305 710,290
  " />

  <!-- Eyes (softer) -->
  <path class="pencil" d="M 672,318 C 675,315 680,315 683,318" />
  <path class="pencil" d="M 693,318 C 696,315 701,315 704,318" />
  <!-- Eyelashes -->
  <path class="light" d="M 672,316 L 670,313" />
  <path class="light" d="M 678,314 L 677,311" />
  <path class="light" d="M 698,314 L 699,311" />
  <path class="light" d="M 704,316 L 706,313" />

  <!-- Nose -->
  <path class="light" d="M 688,320 L 686,336 C 685,339 684,340 683,339" />

  <!-- Gentle mouth -->
  <path class="pencil" d="M 680,348 C 684,352 688,353 692,352 C 696,350 698,348 696,346" />

  <!-- Neck -->
  <path class="light" d="M 680,365 C 678,370 676,375 675,380" />
  <path class="light" d="M 696,365 C 698,370 700,375 701,380" />

  <!-- Shoulders / dress -->
  <path class="pencil" d="
    M 675,380
    C 658,388 640,398 625,410
    C 618,418 615,425 614,435
  " />
  <path class="pencil" d="
    M 701,380
    C 718,388 736,398 750,410
    C 758,418 760,425 762,435
  " />

  <!-- Dress body -->
  <path class="pencil" d="
    M 614,435
    C 610,465 612,495 618,520
    C 628,540 655,550 688,552
    C 720,550 748,540 758,520
    C 764,495 766,465 762,435
  " />

  <!-- Neckline detail -->
  <path class="pencil" d="M 650,395 C 660,408 675,415 688,416 C 700,415 715,408 725,395" />

  <!-- Dress folds -->
  <path class="light" d="M 640,440 C 645,475 650,510 655,540" />
  <path class="light" d="M 735,440 C 730,475 725,510 720,540" />
  <path class="light" d="M 688,420 C 688,460 688,500 688,545" />

  <!-- Hands clasped in front -->
  <path class="pencil" d="
    M 670,490 C 665,495 665,502 670,505
    C 675,508 682,508 688,505
    C 694,508 700,508 705,505
    C 710,502 710,495 705,490
    C 700,487 694,487 688,490
    C 682,487 676,487 670,490
  " />

  <!-- ══════ BOTTOM: KINGDOM BANNERS ══════ -->

  <!-- Left banner: KINGDOM OF THE FRANKS -->
  <line class="banner-line" x1="80" y1="545" x2="80" y2="610" />
  <!-- Banner flag -->
  <path class="pencil" d="M 80,548 L 170,555 L 170,580 L 80,575" />
  <path class="light" d="M 90,558 L 160,562" />
  <path class="light" d="M 90,568 L 160,572" />
  <!-- Fleur-de-lis suggestion -->
  <path class="light" d="M 125,555 C 125,550 128,548 130,550 C 132,548 135,550 135,555 L 135,570 L 125,570 Z" />
  <text class="kingdom-label" x="85" y="600" style="font-size: 11px;">Kingdom of the Franks</text>

  <!-- Right banner: KINGDOM OF LOMBARDY -->
  <line class="banner-line" x1="820" y1="545" x2="820" y2="610" />
  <!-- Banner flag -->
  <path class="pencil" d="M 820,548 L 730,555 L 730,580 L 820,575" />
  <path class="light" d="M 810,558 L 740,562" />
  <path class="light" d="M 810,568 L 740,572" />
  <!-- Iron Crown of Lombardy suggestion -->
  <path class="light" d="M 765,555 L 760,565 L 770,562 L 780,565 L 775,555 Z" />
  <text class="kingdom-label" x="728" y="600" style="font-size: 11px;">Kingdom of Lombardy</text>

  <!-- ══════ MORE FAILED MARRIAGES — smaller, trailing off ══════ -->
  <text class="subtitle" x="450" y="555" text-anchor="middle" style="font-size: 9px; letter-spacing: 2px;">ALSO SEE:</text>

  <text class="label" x="450" y="575" text-anchor="middle" style="font-size: 10px;">Napoleon + Marie Louise (Habsburg)</text>
  <text class="label" x="450" y="592" text-anchor="middle" style="font-size: 10px;">Henry VIII + Catherine of Aragon (Spain)</text>
  <text class="label" x="450" y="609" text-anchor="middle" style="font-size: 10px;">Philip II of Spain + Mary I (England)</text>
  <text class="label" x="450" y="626" text-anchor="middle" style="font-size: 10px;">WWI — all the cousins at war</text>

  <!-- ══════ BOTTOM: THE VERSE ══════ -->
  <text class="verse" x="450" y="665" text-anchor="middle" style="font-size: 14px;">
    "They shall mingle themselves with the seed of men,
  </text>
  <text class="verse" x="450" y="685" text-anchor="middle" style="font-size: 14px;">
    but they shall not cleave one to another." — Daniel 2:43
  </text>

</svg>