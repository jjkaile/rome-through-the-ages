  <path class="light" d="M 480,195 C 500,185 525,185 545,195 C 558,185 575,188 588,200" />
  <path class="light" d="M 195,290 C 208,275 225,268 245,272 C 260,265 278,268 292,280" />
  <path class="light" d="M 605,270 C 618,258 635,255 650,262 C 660,255 672,258 680,270" />
  <path class="light" d="M 320,155 C 340,145 365,142 385,148 C 400,142 420,140 438,148" />

  <!-- Cloud texture — swirls and curls -->
