<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <style>
    .pencil {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .light {
      fill: none;
      stroke: #8a8a8a;
      stroke-width: 0.8;
      stroke-linecap: round;
    }
    .heavy {
      fill: none;
      stroke: #3a3a3a;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .dust {
      fill: none;
      stroke: #aaaaaa;
      stroke-width: 0.5;
    }
    .dust-med {
      fill: none;
      stroke: #888888;
      stroke-width: 0.7;
    }
    .cloud-line {
      fill: none;
      stroke: #5a5a5a;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .bubble {
      fill: none;
      stroke: #3a3a3a;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>

  <!-- ═══════════════════════════════════════════ -->
