  <path class="light" d="M 500,320 C 515,312 532,315 540,328" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- DUST COLUMN — rising from the ground        -->
  <!-- Where the statue used to stand               -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Column of dust connecting ground to cloud -->
  <path class="pencil" d="
    M 335,448
    C 340,470 348,495 355,520
    C 362,545 368,565 372,580
  " />
  <path class="pencil" d="
    M 500,450
    C 498,472 492,498 488,522
    C 482,545 478,565 475,580
  " />

  <!-- Swirling dust in the column -->
  <path class="light" d="M 365,470 C 385,465 408,468 425,475 C 442,468 462,465 480,470" />
  <path class="light" d="M 370,500 C 388,495 405,498 420,505 C 435,498 455,495 472,500" />
  <path class="light" d="M 375,530 C 392,525 408,528 420,535 C 432,528 448,525 465,530" />
  <path class="light" d="M 380,555 C 395,550 410,552 420,558 C 430,552 445,550 460,555" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- GROUND — impact point, crater-ish           -->
  <!-- Rubble, small fragments                     -->
  <!-- ═══════════════════════════════════════════ -->

  <path class="pencil" d="M 0,590 C 120,588 250,592 370,585 C 420,582 430,580 450,582 C 470,580 480,582 530,585 C 650,592 780,588 900,590" />

  <!-- Small rubble fragments around the base -->
  <path class="light" d="M 340,582 L 348,578 L 352,585" />
  <path class="light" d="M 490,580 L 498,576 L 502,583" />
  <path class="light" d="M 410,584 L 416,580 L 420,586" />
  <path class="light" d="M 450,582 L 455,577 L 460,584" />
  <path class="light" d="M 380,586 L 386,582 L 388,588" />
  <path class="light" d="M 465,584 L 470,580 L 474,586" />

  <!-- Pebbles -->
  <circle cx="355" cy="588" r="2" fill="none" stroke="#aaa" stroke-width="0.5" />
  <circle cx="500" cy="586" r="1.5" fill="none" stroke="#aaa" stroke-width="0.5" />
  <circle cx="430" cy="590" r="2.5" fill="none" stroke="#aaa" stroke-width="0.5" />
  <circle cx="395" cy="592" r="1.5" fill="none" stroke="#bbb" stroke-width="0.4" />
  <circle cx="470" cy="590" r="2" fill="none" stroke="#bbb" stroke-width="0.4" />

  <!-- Radiating cracks in the ground from impact -->
  <path class="light" d="M 420,585 L 380,595 L 340,600" />
  <path class="light" d="M 420,585 L 350,605" />
  <path class="light" d="M 430,585 L 470,595 L 520,600" />
  <path class="light" d="M 430,585 L 510,605" />
  <path class="light" d="M 425,586 L 425,610" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- SCATTERED DUST — drifting away from cloud   -->
  <!-- Particles getting smaller toward edges      -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Left side drift -->
  <path class="dust-med" d="M 148,340 L 120,335 L 115,342" />
  <path class="dust-med" d="M 155,305 L 128,298 L 125,306" />
  <path class="dust" d="M 130,320 L 105,316 L 102,322" />
