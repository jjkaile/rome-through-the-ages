    C 218,172 245,160 275,155
    C 300,148 328,145 355,148
    C 375,142 398,135 420,130
    C 438,125 458,122 480,125
    C 502,122 525,125 545,132
    C 568,138 588,148 605,158
    C 628,172 648,190 662,212
    C 678,235 688,262 692,290
    C 698,318 695,345 688,368
    C 680,392 668,410 650,425
    C 632,440 610,448 585,452
    C 558,458 528,455 500,450
    C 472,455 445,458 418,455
    C 390,458 362,455 335,448
    C 308,442 282,432 260,418
    C 238,405 220,388 205,370
    C 188,352 168,340 150,350
  " />

