  <!-- Thought bubbles leading from dust cloud to speech bubble -->
  <ellipse class="pencil" cx="648" cy="200" rx="12" ry="10" />
  <ellipse class="pencil" cx="658" cy="175" rx="8" ry="7" />
  <circle class="pencil" cx="662" cy="158" r="5" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- THE TEXT — "VANITY OF VANITIES!"            -->
  <!-- Hand-drawn feel, emphatic                   -->
  <!-- ═══════════════════════════════════════════ -->

  <text style="font-family: 'Georgia', serif; font-size: 26px; fill: #3a3a3a; font-weight: bold; font-style: italic;" x="712" y="85" text-anchor="middle">
    VANITY
  </text>
  <text style="font-family: 'Georgia', serif; font-size: 16px; fill: #6a6a6a; font-style: italic;" x="712" y="108" text-anchor="middle">
    of
  </text>
  <text style="font-family: 'Georgia', serif; font-size: 26px; fill: #3a3a3a; font-weight: bold; font-style: italic;" x="712" y="138" text-anchor="middle">
    VANITIES!
  </text>

  <!-- Ecclesiastes reference small -->
  <text style="font-family: 'Courier New', monospace; font-size: 9px; fill: #999;" x="712" y="158" text-anchor="middle">
    — Ecclesiastes 1:2
  </text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- GHOST OUTLINE — faint trace of where the    -->
  <!-- statue used to stand, barely visible         -->
  <!-- Like an afterimage                          -->
