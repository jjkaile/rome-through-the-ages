  <path class="dust" d="M 95,310 L 72,308" />
  <path class="dust" d="M 80,335 L 58,334" />
  <circle cx="65" cy="315" r="1.5" fill="none" stroke="#bbb" stroke-width="0.4" />
  <circle cx="48" cy="340" r="1" fill="none" stroke="#ccc" stroke-width="0.3" />

  <!-- Right side drift -->
  <path class="dust-med" d="M 692,310 L 718,305 L 722,312" />
  <path class="dust-med" d="M 688,355 L 715,350 L 718,358" />
  <path class="dust" d="M 720,325 L 745,322 L 748,328" />
  <path class="dust" d="M 740,348 L 762,346 L 764,352" />
  <path class="dust" d="M 760,320 L 782,318" />
  <path class="dust" d="M 775,340 L 798,338" />
  <circle cx="795" cy="325" r="1.5" fill="none" stroke="#bbb" stroke-width="0.4" />
  <circle cx="810" cy="345" r="1" fill="none" stroke="#ccc" stroke-width="0.3" />

  <!-- Top drift -->
  <path class="dust" d="M 380,132 L 375,112 L 382,108" />
  <path class="dust" d="M 440,122 L 438,100 L 445,98" />
  <path class="dust" d="M 510,130 L 515,108 L 520,112" />
  <circle cx="390" cy="100" r="1.5" fill="none" stroke="#bbb" stroke-width="0.4" />
  <circle cx="460" cy="92" r="1" fill="none" stroke="#ccc" stroke-width="0.3" />
  <circle cx="530" cy="98" r="1.5" fill="none" stroke="#bbb" stroke-width="0.4" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- COMIC SPEECH BUBBLE — classic cloud shape   -->
  <!-- Coming from the dust cloud itself           -->
  <!-- As if the dust is speaking                  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Speech bubble — upper right, classic comic cloud shape -->
  <path class="bubble" d="
    M 620,60
    C 615,48 620,35 632,28
    C 642,22 655,20 668,24
    C 678,18 692,15 705,20
    C 718,14 732,18 742,28
    C 755,22 768,28 775,40
    C 785,36 798,42 802,55
    C 812,52 822,58 825,70
    C 832,68 840,76 838,88
    C 845,92 845,102 838,110
    C 845,118 842,128 832,135
    C 838,145 828,150 818,150
    C 822,158 812,164 800,162
    C 802,172 790,175 778,172
    C 775,180 762,182 750,178
    C 745,185 732,185 722,180
    C 712,186 698,185 688,178
    C 678,182 665,180 658,172
    C 648,178 635,175 628,168
    C 618,172 608,168 605,158
    C 595,160 588,152 590,142
    C 582,140 578,130 582,120
    C 575,115 575,105 580,98
    C 575,90 578,80 585,74
