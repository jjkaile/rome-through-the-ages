<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <style>
    .pencil {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .light {
      fill: none;
      stroke: #8a8a8a;
      stroke-width: 0.8;
      stroke-linecap: round;
    }
    .heavy {
      fill: none;
      stroke: #3a3a3a;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .cloud {
      fill: none;
      stroke: #b8b8b8;
      stroke-width: 1.0;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .cloud-light {
      fill: none;
      stroke: #d0d0d0;
      stroke-width: 0.6;
      stroke-linecap: round;
    }
    .ray {
      fill: none;
      stroke: #d0d0d0;
      stroke-width: 0.4;
      stroke-linecap: round;
    }
  </style>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LIGHT RAYS — radiating down from behind    -->
  <!-- the mountain, very subtle, heavenly         -->
  <!-- ═══════════════════════════════════════════ -->
  <path class="ray" d="M 450,50 L 100,700" />
  <path class="ray" d="M 450,50 L 200,700" />
  <path class="ray" d="M 450,50 L 300,700" />
  <path class="ray" d="M 450,50 L 400,700" />
  <path class="ray" d="M 450,50 L 500,700" />
  <path class="ray" d="M 450,50 L 600,700" />
  <path class="ray" d="M 450,50 L 700,700" />
  <path class="ray" d="M 450,50 L 800,700" />
  <path class="ray" d="M 450,50 L 0,500" />
  <path class="ray" d="M 450,50 L 900,500" />
  <path class="ray" d="M 450,50 L 50,600" />
  <path class="ray" d="M 450,50 L 850,600" />

