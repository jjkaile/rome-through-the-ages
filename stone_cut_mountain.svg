  <path class="cloud-light" d="M 40,415 C 50,408 65,408 75,414" />
  <path class="cloud-light" d="M 110,400 C 122,392 138,392 150,398" />
  <path class="cloud-light" d="M 190,392 C 202,384 218,385 228,392" />
  <path class="cloud-light" d="M 270,388 C 280,380 295,382 305,390" />

  <!-- Cloud bank — right side -->
  <path class="cloud" d="
    M 590,380
    C 620,375 650,378 680,385
    C 705,378 730,372 760,378
    C 785,372 810,375 840,382
    C 860,378 880,380 900,385
  " />
  <path class="cloud" d="
    M 575,400
    C 605,392 635,395 665,402
    C 690,395 715,390 745,396
    C 770,390 800,392 830,398
    C 855,394 878,396 900,400
  " />
  <!-- Cloud puffs right -->
  <path class="cloud-light" d="M 620,385 C 632,378 648,378 660,385" />
  <path class="cloud-light" d="M 710,380 C 722,372 738,374 748,382" />
  <path class="cloud-light" d="M 800,384 C 812,376 828,378 838,386" />

  <!-- Cloud bank — center bottom (under the gap where stone falls) -->
  <path class="cloud" d="
    M 310,430
    C 340,425 365,428 390,435
    C 410,430 435,432 460,438
    C 480,432 505,430 530,436
    C 555,432 575,434 590,440
  " />
  <path class="cloud-light" d="M 350,432 C 362,425 378,426 388,434" />
  <path class="cloud-light" d="M 440,436 C 450,428 465,430 475,438" />
  <path class="cloud-light" d="M 530,438 C 540,430 555,432 565,440" />

  <!-- Wispy clouds scattered higher -->
  <path class="cloud-light" d="M 60,360 C 80,354 100,356 115,362" />
  <path class="cloud-light" d="M 780,345 C 800,338 822,340 840,348" />
  <path class="cloud-light" d="M 150,350 C 168,342 185,344 200,352" />
  <path class="cloud-light" d="M 700,355 C 718,348 735,350 748,358" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- THE MOUNTAIN — massive, sitting on clouds   -->
  <!-- Heavenly, ancient, immovable                -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Main mountain silhouette -->
  <path class="heavy" d="
    M 180,395
    C 200,370 230,330 260,290
    C 285,258 315,225 340,200
    C 365,178 390,158 415,142
    C 432,132 445,125 450,120
    C 455,125 468,132 485,142
    C 510,158 535,178 560,200
    C 585,225 615,258 640,290
    C 670,330 700,370 720,395
  " />

  <!-- Mountain base — merges with clouds -->
  <path class="pencil" d="
    M 180,395
    C 190,400 210,408 240,410
    C 280,412 320,415 360,418
    C 400,420 440,422 450,422
    C 460,422 500,420 540,418
    C 580,415 620,412 660,410
    C 690,408 710,400 720,395
  " />

  <!-- Mountain texture — ridges and rock faces -->
  <!-- Left face -->
  <path class="light" d="M 240,350 C 270,320 300,285 330,255" />
  <path class="light" d="M 220,375 C 250,348 280,318 310,290" />
  <path class="light" d="M 280,370 C 305,340 330,305 355,275" />

  <!-- Right face -->
  <path class="light" d="M 660,350 C 630,320 600,285 570,255" />
  <path class="light" d="M 680,375 C 650,348 620,318 590,290" />
  <path class="light" d="M 620,370 C 595,340 570,305 545,275" />

  <!-- Central ridge -->
  <path class="light" d="M 450,120 C 448,160 445,210 440,260" />
  <path class="light" d="M 450,120 C 452,160 455,210 460,260" />

  <!-- Rock detail / crags -->
  <path class="light" d="M 350,210 C 365,205 375,212 380,220" />
  <path class="light" d="M 520,215 C 535,208 545,215 548,224" />
  <path class="light" d="M 310,280 C 325,272 340,278 345,288" />
  <path class="light" d="M 590,275 C 575,268 562,274 558,285" />
  <path class="light" d="M 390,170 C 400,165 410,170 415,178" />
  <path class="light" d="M 510,172 C 500,166 490,172 488,180" />

  <!-- Cross-hatching for shadow (left face, darker) -->
  <path class="light" d="M 230,365 L 240,358" />
  <path class="light" d="M 235,372 L 245,365" />
  <path class="light" d="M 240,378 L 250,371" />
  <path class="light" d="M 250,368 L 260,361" />
  <path class="light" d="M 255,375 L 265,368" />
  <path class="light" d="M 260,382 L 270,375" />
  <path class="light" d="M 270,372 L 280,365" />
  <path class="light" d="M 275,379 L 285,372" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- THE GAP — where the stone was cut from      -->
  <!-- A wedge-shaped void on one side             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Cutout on the right face of the mountain -->
  <path class="heavy" d="
    M 580,280
    C 575,290 568,302 562,315
    C 558,325 555,335 554,342
  " />
  <path class="heavy" d="
    M 610,310
    C 600,318 590,328 582,340
    C 578,346 576,350 575,354
  " />

  <!-- The void — jagged inner edges -->
  <path class="pencil" d="M 580,280 C 588,285 598,292 610,310" />
  <path class="pencil" d="M 554,342 C 560,345 568,350 575,354" />

  <!-- Crack lines radiating from the cut -->
  <path class="light" d="M 580,280 L 572,272" />
  <path class="light" d="M 580,280 L 586,270" />
  <path class="light" d="M 610,310 L 618,302" />
  <path class="light" d="M 610,310 L 620,315" />
  <path class="light" d="M 554,342 L 546,338" />
  <path class="light" d="M 575,354 L 578,362" />

  <!-- Interior of the gap — darker hatching -->
  <path class="light" d="M 585,290 L 592,298" />
  <path class="light" d="M 578,300 L 586,308" />
  <path class="light" d="M 572,310 L 580,318" />
  <path class="light" d="M 566,320 L 574,328" />
  <path class="light" d="M 560,332 L 568,340" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- THE STONE — falling from the gap            -->
  <!-- Tumbling down through the clouds            -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Stone — irregular, rough, matching the gap shape -->
  <path class="heavy" d="
    M 560,475
    C 555,465 552,455 555,445
    C 558,438 565,432 574,430
    C 582,428 592,432 598,440
    C 605,448 606,458 602,468
    C 598,478 590,484 580,486
    C 570,488 562,484 560,475
    Z
  " />

  <!-- Stone surface — jagged, raw -->
  <path class="light" d="M 562,455 L 575,450 L 568,468" />
  <path class="light" d="M 578,435 L 590,445 L 582,460" />
  <path class="light" d="M 592,450 L 600,462 L 594,475" />
  <path class="light" d="M 565,442 L 558,448 L 564,458" />

  <!-- Jagged protrusions -->
  <path class="pencil" d="M 558,450 L 550,446 L 554,455" />
  <path class="pencil" d="M 598,442 L 606,438 L 602,448" />
  <path class="pencil" d="M 575,428 L 578,420 L 582,430" />
  <path class="pencil" d="M 565,484 L 560,490 L 568,488" />
  <path class="pencil" d="M 595,478 L 602,482 L 598,486" />

  <!-- Shadow hatching on stone -->
  <path class="light" d="M 558,470 L 565,465" />
  <path class="light" d="M 560,476 L 567,471" />
  <path class="light" d="M 563,482 L 570,477" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- FALLING MOTION — the stone descending       -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Dotted path from gap to stone -->
  <path style="fill:none;stroke:#b0b0b0;stroke-width:0.6;stroke-dasharray:4 4;" d="
    M 575,358
    C 578,380 580,400 580,420
    C 580,430 578,440 575,450
  " />

  <!-- Small debris falling with it -->
  <path class="light" d="M 548,460 L 552,456 L 550,463" />
  <path class="light" d="M 610,465 L 614,460 L 612,468" />
  <path class="light" d="M 540,480 L 544,476 L 542,483" />
  <path class="light" d="M 618,475 L 622,472 L 620,480" />

  <!-- Pebbles -->
  <circle cx="535" cy="490" r="2" fill="none" stroke="#aaa" stroke-width="0.6" />
  <circle cx="625" cy="485" r="1.5" fill="none" stroke="#aaa" stroke-width="0.5" />
  <circle cx="545" cy="498" r="1" fill="none" stroke="#bbb" stroke-width="0.4" />
  <circle cx="615" cy="495" r="1.5" fill="none" stroke="#aaa" stroke-width="0.5" />

  <!-- Cloud wisps the stone is falling through -->
  <path class="cloud-light" d="M 540,448 C 550,442 565,444 572,450" />
  <path class="cloud-light" d="M 588,445 C 598,438 612,440 620,448" />
  <path class="cloud-light" d="M 530,470 C 540,464 552,466 558,472" />
  <path class="cloud-light" d="M 600,468 C 610,462 622,464 630,470" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- BELOW THE CLOUDS — where it's heading       -->
  <!-- Just darkness / empty space below            -->
  <!-- suggesting the earth far below               -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- A few more cloud wisps at the bottom edge -->
  <path class="cloud-light" d="M 0,580 C 40,572 80,575 120,582" />
  <path class="cloud-light" d="M 200,575 C 240,568 280,570 320,578" />
  <path class="cloud-light" d="M 580,578 C 620,570 660,572 700,580" />
  <path class="cloud-light" d="M 780,572 C 820,565 860,568 900,575" />

  <!-- Motion lines below stone — it's accelerating downward -->
  <path style="fill:none;stroke:#c0c0c0;stroke-width:0.4;" d="M 570,500 L 568,530" />
  <path style="fill:none;stroke:#c0c0c0;stroke-width:0.4;" d="M 580,502 L 578,535" />
  <path style="fill:none;stroke:#c0c0c0;stroke-width:0.4;" d="M 590,500 L 588,528" />
  <path style="fill:none;stroke:#c0c0c0;stroke-width:0.4;" d="M 575,505 L 573,540" />
  <path style="fill:none;stroke:#c0c0c0;stroke-width:0.4;" d="M 585,504 L 583,538" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOP: tiny stars — it's heavenly space        -->
  <!-- ═══════════════════════════════════════════ -->
  <g style="fill:none; stroke:#d8d8d8; stroke-width:0.5;">
    <line x1="80" y1="25" x2="80" y2="33" />
    <line x1="76" y1="29" x2="84" y2="29" />

    <line x1="200" y1="45" x2="200" y2="53" />
    <line x1="196" y1="49" x2="204" y2="49" />

    <line x1="750" y1="30" x2="750" y2="38" />
    <line x1="746" y1="34" x2="754" y2="34" />

    <line x1="820" y1="55" x2="820" y2="63" />
    <line x1="816" y1="59" x2="824" y2="59" />

    <line x1="350" y1="20" x2="350" y2="28" />
    <line x1="346" y1="24" x2="354" y2="24" />

    <line x1="550" y1="35" x2="550" y2="43" />
    <line x1="546" y1="39" x2="554" y2="39" />

    <line x1="130" y1="60" x2="130" y2="68" />
    <line x1="126" y1="64" x2="134" y2="64" />

    <line x1="680" y1="50" x2="680" y2="58" />
    <line x1="676" y1="54" x2="684" y2="54" />
  </g>

  <!-- Dot stars -->
  <circle cx="50" cy="40" r="1" fill="#ddd" stroke="none" />
  <circle cx="300" cy="30" r="1" fill="#ddd" stroke="none" />
  <circle cx="600" cy="25" r="1" fill="#ddd" stroke="none" />
  <circle cx="870" cy="42" r="1" fill="#ddd" stroke="none" />
  <circle cx="420" cy="50" r="1.2" fill="#ddd" stroke="none" />
  <circle cx="160" cy="48" r="1" fill="#ddd" stroke="none" />
  <circle cx="720" cy="65" r="1" fill="#ddd" stroke="none" />
  <circle cx="480" cy="15" r="1" fill="#ddd" stroke="none" />

</svg>