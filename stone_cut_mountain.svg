  <!-- CLOUDS — bottom layer, the mountain sits    -->
  <!-- on top of these, floating in heaven         -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Cloud bank — left side -->
  <path class="cloud" d="
    M 0,420
    C 30,410 55,400 80,405
    C 105,395 130,388 160,392
    C 185,385 210,380 240,386
    C 260,378 285,375 310,380
  " />
  <path class="cloud" d="
    M 0,435
    C 35,428 65,418 95,422
    C 120,415 145,408 175,412
    C 200,405 230,398 260,404
    C 285,398 305,395 325,400
  " />
