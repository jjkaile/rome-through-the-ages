<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    .pencil {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .light {
      fill: none;
      stroke: #8a8a8a;
      stroke-width: 0.8;
      stroke-linecap: round;
    }
    .construction {
      fill: none;
      stroke: #b0b0b0;
      stroke-width: 0.5;
      stroke-dasharray: 4 3;
    }
    .flame {
      fill: none;
      stroke: #4a4a4a;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .flame-light {
      fill: none;
      stroke: #8a8a8a;
      stroke-width: 0.7;
      stroke-linecap: round;
    }
    .star {
      fill: none;
      stroke: #9a9a9a;
      stroke-width: 0.6;
    }
    .star-bright {
      fill: none;
      stroke: #6a6a6a;
      stroke-width: 1.0;
    }
    .label {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      fill: #6a6a6a;
    }
    .speed-line {
      fill: none;
      stroke: #aaaaaa;
      stroke-width: 0.5;
      stroke-linecap: round;
    }
