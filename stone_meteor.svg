    <line x1="46" y1="274" x2="54" y2="274" />

    <line x1="140" y1="220" x2="140" y2="228" />
    <line x1="136" y1="224" x2="144" y2="224" />

    <line x1="250" y1="170" x2="250" y2="178" />
    <line x1="246" y1="174" x2="254" y2="174" />

