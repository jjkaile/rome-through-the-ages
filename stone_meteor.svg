    <circle cx="110" cy="180" r="1.5" fill="#aaa" stroke="none" />
    <circle cx="350" cy="80" r="1" fill="#bbb" stroke="none" />
    <circle cx="60" cy="130" r="1" fill="#bbb" stroke="none" />
    <circle cx="200" cy="200" r="1.5" fill="#aaa" stroke="none" />
    <circle cx="20" cy="80" r="1" fill="#bbb" stroke="none" />
    <circle cx="300" cy="130" r="1" fill="#bbb" stroke="none" />
    <circle cx="170" cy="290" r="1" fill="#bbb" stroke="none" />
    <circle cx="100" cy="400" r="1.5" fill="#aaa" stroke="none" />
    <circle cx="40" cy="510" r="1" fill="#bbb" stroke="none" />
    <circle cx="750" cy="70" r="1" fill="#bbb" stroke="none" />
