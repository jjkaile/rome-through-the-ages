  <path class="pencil" d="
    M 530,175
    C 540,160 558,148 575,142
    C 590,138 605,140 618,145
    C 632,150 642,158 648,168
    C 655,180 658,195 655,210
    C 652,225 645,238 635,248
    C 622,258 608,264 592,265
    C 578,266 562,262 550,255
    C 537,246 528,234 524,220
    C 520,205 522,190 530,175 Z
  " />

