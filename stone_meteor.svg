  <path class="light" d="M 200,518 L 198,540" />
  <path class="light" d="M 212,520 L 215,540" />
  <path class="light" d="M 265,520 L 268,538" />
  <path class="light" d="M 280,516 L 278,538" />
  <path class="light" d="M 292,518 L 295,536" />

