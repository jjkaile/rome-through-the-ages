  <path class="construction" d="M 240,530 L 260,558" />
  <path class="construction" d="M 240,530 L 235,560" />
  <path class="construction" d="M 240,530 L 210,548" />
  <path class="construction" d="M 240,530 L 270,550" />

  <!-- ══════ LABELS ══════ -->
  <text class="label" x="20" y="490">FEET</text>
  <text class="label" x="20" y="505" style="font-size:10px; fill:#999">(iron + clay)</text>

  <text class="label" x="480" y="290" style="font-size:11px">"not cut by</text>
  <text class="label" x="480" y="305" style="font-size:11px"> human hands"</text>

</svg>