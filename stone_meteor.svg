  <circle cx="740" cy="45" r="1.5" fill="none" stroke="#8a8a8a" stroke-width="0.6" />
  <circle cx="755" cy="52" r="1" fill="none" stroke="#9a9a9a" stroke-width="0.5" />
  <circle cx="730" cy="28" r="1.5" fill="none" stroke="#8a8a8a" stroke-width="0.6" />
  <circle cx="715" cy="90" r="2" fill="none" stroke="#7a7a7a" stroke-width="0.8" />
  <circle cx="730" cy="75" r="1.5" fill="none" stroke="#8a8a8a" stroke-width="0.6" />
  <circle cx="735" cy="108" r="1" fill="none" stroke="#9a9a9a" stroke-width="0.5" />
  <circle cx="745" cy="95" r="1.5" fill="none" stroke="#8a8a8a" stroke-width="0.6" />
  <circle cx="718" cy="130" r="1" fill="none" stroke="#9a9a9a" stroke-width="0.5" />

