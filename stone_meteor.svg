  <path class="light" d="M 580,155 L 595,180 L 615,170" />
  <path class="light" d="M 600,190 L 620,210 L 605,235" />
  <path class="light" d="M 565,245 L 585,230 L 610,245" />
  <path class="light" d="M 540,210 L 560,220 L 548,240" />
  <path class="light" d="M 625,160 L 640,180 L 635,200" />

  <!-- Extra jagged edges — "not cut by human hands" roughness -->
