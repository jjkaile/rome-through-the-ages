  <path class="light" d="M 310,528 C 325,530 340,528 355,530" />
  <path class="light" d="M 80,535 C 95,533 110,535 120,537" />
  <path class="light" d="M 350,532 C 370,530 390,532 400,534" />

  <!-- ══════ IMPACT ANTICIPATION — light radiating lines from impact point ══════ -->
  <!-- Where the stone will hit (projected) -->
