    <line x1="81" y1="99" x2="89" y2="99" />

    <line x1="200" y1="55" x2="200" y2="63" />
    <line x1="196" y1="59" x2="204" y2="59" />

    <line x1="30" y1="160" x2="30" y2="168" />
    <line x1="26" y1="164" x2="34" y2="164" />

    <line x1="155" y1="140" x2="155" y2="148" />
    <line x1="151" y1="144" x2="159" y2="144" />

    <!-- Middle area -->
    <line x1="320" y1="35" x2="320" y2="43" />
    <line x1="316" y1="39" x2="324" y2="39" />

