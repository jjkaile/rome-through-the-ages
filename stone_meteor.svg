    C 600,120 625,95 650,72
    C 665,58 678,48 690,45
  " />
  <path class="flame-light" d="
    M 612,148
    C 628,128 650,105 670,85
    C 682,72 695,62 705,55
  " />
  <path class="flame-light" d="
    M 640,155
    C 652,140 668,120 682,100
    C 690,88 700,78 710,70
  " />

