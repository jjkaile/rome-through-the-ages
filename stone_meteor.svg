  <path class="pencil" d="M 618,145 L 625,138 L 632,148" />
  <path class="pencil" d="M 650,185 L 660,180 L 658,195" />
  <path class="pencil" d="M 530,200 L 520,195 L 524,208" />
  <path class="pencil" d="M 545,255 L 538,260 L 548,262" />
  <path class="pencil" d="M 640,240 L 648,245 L 638,252" />

