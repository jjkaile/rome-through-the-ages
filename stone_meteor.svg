    <line x1="70" y1="380" x2="70" y2="388" />
    <line x1="66" y1="384" x2="74" y2="384" />

    <line x1="35" y1="450" x2="35" y2="458" />
    <line x1="31" y1="454" x2="39" y2="454" />

    <line x1="160" y1="340" x2="160" y2="348" />
    <line x1="156" y1="344" x2="164" y2="344" />

