  <path class="light" d="M 538,232 L 548,227" />
  <path class="light" d="M 540,239 L 550,234" />
  <path class="light" d="M 543,245 L 553,240" />
  <path class="light" d="M 555,250 L 565,245" />
  <path class="light" d="M 558,256 L 568,251" />

