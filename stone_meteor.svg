  <path class="light" d="M 0,520 C 100,515 200,518 300,520 C 400,522 500,518 600,520 C 700,522 750,520 800,518" />

  <!-- Feet of the statue — just the tops visible, about to be struck -->
  <!-- Left foot -->
  <path class="pencil" d="
    M 180,520
    C 175,515 170,512 168,515
    C 165,518 162,520 160,525
    C 158,530 160,535 165,538
    C 172,542 185,544 200,543
    C 215,542 225,540 230,535
    C 233,530 232,525 228,520
    C 225,516 220,515 215,517
